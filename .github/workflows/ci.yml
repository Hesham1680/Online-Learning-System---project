name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install g++
        run: sudo apt-get install -y g++

      - name: Compile
        run: |
          g++ -std=c++17 -Wall -Wextra \
            User.cpp \
            Course.cpp \
            Cart.cpp \
            Wishlist.cpp \
            Utils.cpp \
            main.cpp \
            -o online_learning_system
