name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install g++
        run: sudo apt-get install -y g++

      - name: Compile
        run: |
          g++ -std=c++17 -Wall -Wextra -Iinclude \
            src/User.cpp \
            src/Course.cpp \
            src/Cart.cpp \
            src/Wishlist.cpp \
            src/Utils.cpp \
            src/main.cpp \
            -o online_learning_system
